name: ubuntu-geonames
type: charm
title: Ubuntu Geonames charm
summary: geoname-lookup.ubuntu.com
description: |
  **Ubuntu Geonames Operator** is a [charm](https://juju.is/charms-architecture)
  that provides a service to query for timezones and geodata.

links:
  website:
    - https://charmhub.io/ubuntu-geonames
  issues:
    - https://github.com/canonical/ubuntu-geonames-operator/issues
  source:
    - https://github.com/canonical/ubuntu-geonames-operator

base: ubuntu@24.04
platforms:
  amd64:

parts:
  ubuntu-geonames-charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]
    override-build: |
      craftctl default  # Run the default build steps.
      git describe --always > $CRAFT_PART_INSTALL/version

charm-libs:
  - lib: traefik_k8s.ingress
    version: "2"

requires:
  ingress:
    interface: ingress
    limit: 1
    optional: true

config:
  options:
    log-level:
      description: |
        Configures the log level of the application.
        
        Acceptable values are: "info", "debug", "warning", "error" and "critical"
      default: "debug"
      type: string

