<VirtualHost *:80>
    DocumentRoot    /home/ubuntu/ubuntu-geonames
    ServerName     geoname-lookup.ubuntu.com
    ServerAdmin    rt@admin.canonical.com
    WSGIScriptAlias / /home/ubuntu/ubuntu-geonames/geoname.wsgi
    <Directory /home/ubuntu/ubuntu-geonames/>
        <Files geoname.wsgi>
            Order allow,deny
            Allow from all
        </Files>
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    LogLevel warn
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
